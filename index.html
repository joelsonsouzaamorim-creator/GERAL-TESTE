<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SELIC — ACESSO AO SISTEMA</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c10;
      --panel: #12151c;
      --border: #1e2330;
      --accent: #22c55e;
      --accent-dim: rgba(34,197,94,0.12);
      --accent-glow: rgba(34,197,94,0.35);
      --blue: #2563eb;
      --blue-dim: rgba(37,99,235,0.12);
      --blue-glow: rgba(37,99,235,0.35);
      --amber: #f59e0b;
      --amber-dim: rgba(245,158,11,0.12);
      --amber-glow: rgba(245,158,11,0.35);
      --violet: #8b5cf6;
      --violet-dim: rgba(139,92,246,0.12);
      --violet-glow: rgba(139,92,246,0.35);
      --text: #f1f5f9;
      --muted: #64748b;
      --danger: #ef4444;
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(34,197,94,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34,197,94,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridScroll 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridScroll {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    .bg-glow {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(34,197,94,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      padding: 20px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-badge {
      display: inline-block;
      background: var(--accent-dim);
      border: 1px solid rgba(34,197,94,0.25);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    .login-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 4px;
      line-height: 1;
      background: linear-gradient(135deg, #f1f5f9 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-subtitle {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 2px;
      margin-top: 6px;
      font-family: 'DM Mono', monospace;
    }

    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
      position: relative;
    }

    /* Cantos decorativos */
    .corner {
      position: absolute;
      width: 18px; height: 18px;
      opacity: 0.3;
      transition: opacity 0.3s;
    }
    .login-card:hover .corner { opacity: 0.55; }
    .corner-tl { top: 12px; left: 12px;   border-top: 1px solid var(--accent); border-left:  1px solid var(--accent); }
    .corner-tr { top: 12px; right: 12px;  border-top: 1px solid var(--accent); border-right: 1px solid var(--accent); }
    .corner-bl { bottom: 12px; left: 12px;  border-bottom: 1px solid var(--accent); border-left:  1px solid var(--accent); }
    .corner-br { bottom: 12px; right: 12px; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      background: #0d1017;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      text-transform: uppercase;
    }

    .field input::placeholder { color: #2d3748; }

    .field input:focus {
      border-color: var(--active-color, var(--accent));
      box-shadow: 0 0 0 3px var(--active-dim, var(--accent-dim));
    }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
      letter-spacing: 0.5px;
    }

    .error-msg.show { display: block; }

    /* ── SELEÇÃO DE SISTEMA ── */
    .system-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .system-select {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 22px;
    }

    .system-btn {
      background: #0d1017;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .system-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: 12px;
    }

    /* Cores por sistema */
    .system-btn.divacp::before  { background: var(--accent-dim); }
    .system-btn.divcon::before  { background: var(--blue-dim); }
    .system-btn.cec::before     { background: var(--amber-dim); }
    .system-btn.cpc::before     { background: var(--violet-dim); }

    .system-btn:hover::before,
    .system-btn.active::before  { opacity: 1; }

    .system-btn.divacp:hover, .system-btn.divacp.active { border-color: var(--accent);  box-shadow: 0 0 18px var(--accent-glow); }
    .system-btn.divcon:hover, .system-btn.divcon.active { border-color: var(--blue);    box-shadow: 0 0 18px var(--blue-glow); }
    .system-btn.cec:hover,    .system-btn.cec.active    { border-color: var(--amber);   box-shadow: 0 0 18px var(--amber-glow); }
    .system-btn.cpc:hover,    .system-btn.cpc.active    { border-color: var(--violet);  box-shadow: 0 0 18px var(--violet-glow); }

    .system-btn-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 3px;
      position: relative;
      z-index: 1;
      transition: color 0.2s;
      color: #64748b;
    }

    .system-btn.divacp.active .system-btn-name,
    .system-btn.divacp:hover  .system-btn-name { color: var(--accent); }

    .system-btn.divcon.active .system-btn-name,
    .system-btn.divcon:hover  .system-btn-name { color: #60a5fa; }

    .system-btn.cec.active .system-btn-name,
    .system-btn.cec:hover  .system-btn-name    { color: var(--amber); }

    .system-btn.cpc.active .system-btn-name,
    .system-btn.cpc:hover  .system-btn-name    { color: #c4b5fd; }

    .system-btn-desc {
      font-size: 9px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-top: 3px;
      position: relative;
      z-index: 1;
    }

    /* ── BOTÃO ENTRAR ── */
    .btn-enter {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-enter.divacp-mode { background: var(--accent);  color: #0a0c10; box-shadow: 0 8px 24px var(--accent-glow); }
    .btn-enter.divcon-mode { background: var(--blue);    color: #fff;    box-shadow: 0 8px 24px var(--blue-glow); }
    .btn-enter.cec-mode    { background: var(--amber);   color: #0a0c10; box-shadow: 0 8px 24px var(--amber-glow); }
    .btn-enter.cpc-mode    { background: var(--violet);  color: #fff;    box-shadow: 0 8px 24px var(--violet-glow); }

    .btn-enter:hover  { transform: translateY(-2px); filter: brightness(1.1); }
    .btn-enter:active { transform: translateY(0); }

    .btn-enter.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .btn-enter.loading::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: shimmer 0.8s ease infinite;
    }

    @keyframes shimmer { to { left: 100%; } }

    .login-footer {
      text-align: center;
      margin-top: 18px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: #2d3748;
    }

    @media (max-width: 480px) {
      .login-title { font-size: 40px; }
      .login-card  { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="login-wrap">

    <div class="login-header">
      <div class="login-badge">SISTEMA DE CONTROLE</div>
      <div class="login-title">SELIC</div>
      <div class="login-subtitle">SECRETARIA MUNICIPAL DE LICITAÇÕES E CONTRATOS</div>
    </div>

    <div class="login-card">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <div class="field">
        <label>USUÁRIO</label>
        <input type="text" id="inputUsuario" placeholder="SEU USUÁRIO" autocomplete="off">
      </div>

      <div class="field">
        <label>SENHA</label>
        <input type="password" id="inputSenha" placeholder="••••••••" autocomplete="off">
      </div>

      <div id="errorMsg" class="error-msg">USUÁRIO OU SENHA INCORRETOS.</div>

      <div class="system-label">SELECIONE O SISTEMA</div>
      <div class="system-select">
        <button class="system-btn divacp active" id="btnDivacp" onclick="selectSystem('divacp')">
          <div class="system-btn-name">DIVACP</div>
          <div class="system-btn-desc">PAINEL DE PROCESSOS</div>
        </button>
        <button class="system-btn divcon" id="btnDivcon" onclick="selectSystem('divcon')">
          <div class="system-btn-name">DIVCON</div>
          <div class="system-btn-desc">CONTROLE DE PROCESSOS</div>
        </button>
        <button class="system-btn cec" id="btnCec" onclick="selectSystem('cec')">
          <div class="system-btn-name">CEC</div>
          <div class="system-btn-desc">CONTROLE DE PROCESSOS</div>
        </button>
        <button class="system-btn cpc" id="btnCpc" onclick="selectSystem('cpc')">
          <div class="system-btn-name">CPC</div>
          <div class="system-btn-desc">CONTROLE DE PROCESSOS</div>
        </button>
      </div>

      <button class="btn-enter divacp-mode" id="btnEntrar" onclick="fazerLogin()">
        ENTRAR NO SISTEMA
      </button>
    </div>

    <div class="login-footer">© 2026 — VERSÃO 04 — ACESSO RESTRITO</div>

  </div>

  <script>
    const USUARIOS = {
      'ADMIN':    '1234',
      'JOELSON':  '1234',
      'OPERADOR': '1234'
    };

    // Destino de cada sistema
    const DESTINOS = {
      'divacp': 'DIVACP.html',
      'divcon': 'DIVCON.html',
      'cec':    'CEC.html',
      'cpc':    'CPC.html'
    };

    let sistemaSelecionado = 'divacp';

    function selectSystem(sistema) {
      sistemaSelecionado = sistema;

      // Desativa todos os botões
      document.querySelectorAll('.system-btn').forEach(b => b.classList.remove('active'));

      // Ativa o selecionado
      const ids = { divacp: 'btnDivacp', divcon: 'btnDivcon', cec: 'btnCec', cpc: 'btnCpc' };
      document.getElementById(ids[sistema]).classList.add('active');

      // Atualiza cor do botão entrar
      document.getElementById('btnEntrar').className = `btn-enter ${sistema}-mode`;
    }

    function fazerLogin() {
      const usuario = document.getElementById('inputUsuario').value.trim().toUpperCase();
      const senha   = document.getElementById('inputSenha').value.trim();
      const erro    = document.getElementById('errorMsg');
      const btn     = document.getElementById('btnEntrar');

      erro.classList.remove('show');

      if (!usuario || !senha) {
        erro.textContent = 'PREENCHA O USUÁRIO E A SENHA.';
        erro.classList.add('show');
        return;
      }

      if (!sistemaSelecionado) {
        erro.textContent = 'SELECIONE O SISTEMA.';
        erro.classList.add('show');
        return;
      }

      if (USUARIOS[usuario] !== senha) {
        erro.textContent = 'USUÁRIO OU SENHA INCORRETOS.';
        erro.classList.add('show');
        document.getElementById('inputSenha').value = '';
        return;
      }

      // Login OK
      btn.classList.add('loading');
      btn.textContent = 'CARREGANDO...';

      setTimeout(function() {
        window.location.href = DESTINOS[sistemaSelecionado];
      }, 800);
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') fazerLogin();
    });

    document.getElementById('inputUsuario').addEventListener('input', function() {
      this.value = this.value.toUpperCase();
    });
  </script>

</body>
</html>
